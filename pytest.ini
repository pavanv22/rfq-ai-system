[pytest]
# Pytest configuration for RFQ-AI system tests

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage options (when running with --cov)
[coverage:run]
source = backend/app
omit = 
    */tests/*
    */migrations/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:

markers =
    integration: integration tests requiring database
    unit: unit tests
    e2e: end-to-end workflow tests
    performance: performance/load tests
    error_handling: error scenario tests
    slow: tests that take > 5 seconds
    requires_ollama: tests requiring Ollama LLM service
    skip_ci: tests to skip in CI environment
